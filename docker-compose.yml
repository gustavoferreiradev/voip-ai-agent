services:
  voip-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voip-ai
    hostname: voip-ai
    restart: unless-stopped
    network_mode: host
    env_file: app/.env
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
      FS_HOST: "127.0.0.1"
      VM_IP: "10.197.3.242" # IP da VM com FS PBX
      VM_USER: "ubuntu" # usuário SSH da VM Multipass
      SSH_KEY: "/root/.ssh/multipass_key"
    volumes:
      - postgres-data:/var/lib/postgresql
      - app-logs:/app/logs
      # Chave SSH do Multipass para o tunnel ESL
      - /var/snap/multipass/common/data/multipassd/ssh-keys/id_rsa:/root/.ssh/multipass_key:ro
    ulimits:
      nofile: { soft: 65536, hard: 65536 }

volumes:
  postgres-data:
  app-logs:
