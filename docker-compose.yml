services:
  voip-ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Obtenha seu token em: https://signalwire.com/freeswitch
        # Deixe vazio para usar o mirror público (files.freeswitch.org)
        SIGNALWIRE_TOKEN:
    container_name: voip-ai
    hostname: voip-ai
    restart: unless-stopped

    # host mode evita NAT para SIP/RTP
    network_mode: host

    env_file: app/.env # substitua por .env com as chaves reais

    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production

    volumes:
      - freeswitch-conf:/etc/freeswitch
      - freeswitch-data:/var/lib/freeswitch
      - freeswitch-logs:/var/log/freeswitch
      - postgres-data:/var/lib/postgresql
      - app-logs:/app/logs
      # Monte o código em dev para hot-reload:
      # - ./app:/app

    ulimits:
      nofile: { soft: 65536, hard: 65536 }
      core: { soft: -1, hard: -1 }

    cap_add:
      - SYS_NICE
      - NET_ADMIN

volumes:
  freeswitch-conf:
  freeswitch-data:
  freeswitch-logs:
  postgres-data:
  app-logs:
